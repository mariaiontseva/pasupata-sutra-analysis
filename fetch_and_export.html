<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fetching Data...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            text-align: center;
        }
        .loading {
            font-size: 24px;
            margin: 20px;
        }
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2196F3;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: green;
            font-size: 20px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="loading">⏳ Fetching your data from Firebase...</div>
    <div class="spinner"></div>
    <div id="status"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD98mmAVwOSD3vt0KP5GmMHlCVdaUnEu1Y",
            authDomain: "sanskrit-884a4.firebaseapp.com",
            databaseURL: "https://sanskrit-884a4-default-rtdb.firebaseio.com",
            projectId: "sanskrit-884a4",
            storageBucket: "sanskrit-884a4.firebasestorage.app",
            messagingSenderId: "292538731501",
            appId: "1:292538731501:web:08c2744572f40e3d5a75e4",
            measurementId: "G-SKBSQHRQTV"
        };

        firebase.initializeApp(firebaseConfig);

        function cleanHTML(html) {
            if (!html) return '';
            const div = document.createElement('div');
            div.innerHTML = html;
            let text = div.textContent || div.innerText || '';
            // Clean up whitespace
            text = text.replace(/\s+/g, ' ').trim();
            return text;
        }

        firebase.auth().signInAnonymously()
            .then(() => {
                const userId = firebase.auth().currentUser.uid;
                const dbRef = firebase.database().ref('pasupata_analysis/' + userId);

                dbRef.once('value')
                    .then(snapshot => {
                        const data = snapshot.val();

                        if (!data) {
                            document.getElementById('status').innerHTML = '<div style="color:red;">No data found in Firebase!</div>';
                            return;
                        }

                        // Build CSV
                        let csv = [];

                        // Header
                        csv.push(['Verse', 'Sanskrit', 'Word-by-Word', 'Literal', 'Translation', 'Grammar', "Jim's Translation"]);

                        // Get all verse numbers
                        const cellClasses = ['sanskrit', 'words', 'literal', 'translation', 'grammar', 'meaning', 'jims'];
                        const verseNumbers = new Set();

                        Object.keys(data).forEach(key => {
                            const match = key.match(/\d+/);
                            if (match) verseNumbers.add(parseInt(match[0]));
                        });

                        const sortedVerses = Array.from(verseNumbers).sort((a, b) => a - b);

                        // Process each verse
                        sortedVerses.forEach(verseNum => {
                            const row = [verseNum];

                            cellClasses.forEach(cls => {
                                const key = cls + verseNum;
                                const content = cleanHTML(data[key] || '');
                                row.push(content);
                            });

                            csv.push(row);
                        });

                        // Convert to CSV format with proper escaping
                        const csvContent = csv.map(row =>
                            row.map(cell => {
                                const escaped = String(cell).replace(/"/g, '""');
                                return `"${escaped}"`;
                            }).join(',')
                        ).join('\n');

                        // Create download
                        const BOM = '\uFEFF';
                        const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = 'vivekamartanda_complete.csv';
                        link.click();

                        document.getElementById('status').innerHTML = `
                            <div class="success">
                                ✅ Success! Downloaded ${sortedVerses.length} verses!<br><br>
                                <strong>Next steps:</strong><br>
                                1. Open the downloaded CSV file<br>
                                2. Copy all (Ctrl+A, Ctrl+C)<br>
                                3. Go to <a href="https://sheets.google.com" target="_blank">Google Sheets</a><br>
                                4. Create new spreadsheet<br>
                                5. Paste (Ctrl+V)<br><br>
                                You can close this window now.
                            </div>
                        `;
                    })
                    .catch(error => {
                        document.getElementById('status').innerHTML = `<div style="color:red;">Error: ${error.message}</div>`;
                    });
            })
            .catch(error => {
                document.getElementById('status').innerHTML = `<div style="color:red;">Auth Error: ${error.message}</div>`;
            });
    </script>
</body>
</html>
